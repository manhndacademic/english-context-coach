services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: english_context_coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d english_context_coach"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecc_network

  web:
    build: .
    restart: unless-stopped
    command: ["bun", "server.js"]
    env_file: .env
    environment:
      AUTH_TRUST_HOST: "true"
    expose:
      - "3000"
    networks:
      - npm_network
      - ecc_network
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    build: .
    command: ["bun", "run", "db:migrate"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/english_context_coach
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecc_network

  worker:
    build: .
    restart: unless-stopped
    command: ["bun", "run", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/english_context_coach
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - ecc_network

volumes:
  postgres-data:

networks:
  ecc_network:
  npm_network:
    external: true
